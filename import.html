<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Import Tabs</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #f9fafb;
      color: #111827;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 500px;
      width: 100%;
    }
    h2 { margin-top: 0; }
    p { color: #6b7280; margin-bottom: 24px; }
    input[type="file"] {
      display: block;
      margin: 0 auto 20px auto;
      padding: 10px;
      border: 2px dashed #d1d5db;
      border-radius: 8px;
      width: 80%;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Import Tabs from CSV</h2>
    <p>Select the CSV file you exported previously. This will open the tabs in your browser.</p>
    <input type="file" id="fileInput" accept=".csv" />
  </div>
  <script src="import.js"></script>
</body>
</html>
